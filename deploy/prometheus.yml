# Example Prometheus scrape config for Datacenter Dashboard
# Place in /etc/prometheus/prometheus.yml or use as a scrape_configs fragment.

scrape_configs:
  - job_name: datacenter-dashboard
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8000
        labels:
          service: datacenter-dashboard
          env: production